<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Janta Party | AI for the People</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --primary: #00ff9f; --dark: #0a0a0f; --card: #12121a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; line-height: 1.7; }
    header { background: linear-gradient(135deg, #00ff9f, #00b86e); color: black; text-align: center; padding: 60px 20px 40px; position: relative; }
    .logo { font-size: 3.8rem; font-family: 'Bebas Neue', sans-serif; letter-spacing: 4px; }
    .join-btn, .members-btn { position: absolute; top: 20px; padding: 10px 18px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    .join-btn { right: 20px; background: black; color: var(--primary); }
    .members-btn { left: 20px; background: #00ff9f; color: black; }
    .hero { padding: 60px 20px; text-align: center; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://source.unsplash.com/random/1920x1080/?ai,future'); background-size: cover; }
    .section { padding: 60px 20px; background: var(--card); }
    .points { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 18px; }
    .point { background: #1a1a24; padding: 20px; border-radius: 12px; border-left: 6px solid var(--primary); }
    .point-number { color: var(--primary); font-weight: bold; }
    .join-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1100px; margin: 40px auto; }
    .join-card { background: #1a1a24; padding: 25px; border-radius: 16px; text-align: center; border: 2px solid #333; }
    .join-card:hover { border-color: var(--primary); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { background: #12121a; padding: 30px; border-radius: 16px; width: 90%; max-width: 500px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; }
    .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #1e1e2b; color: white; }
    .members-list { display: none; margin-top: 30px; }
    .member { background: #1a1a24; padding: 15px; margin: 10px 0; border-radius: 10px; border-left: 5px solid var(--primary); }
  </style>
</head>

    <div class="logo">AI JANTA PARTY</div>
    <button class="members-btn" onclick="showMembers()">Joined Members</button>
    <button class="join-btn" onclick="document.getElementById('join-section').scrollIntoView({behavior:'smooth'})">JOIN PARTY</button>
  </header>

  </div>
